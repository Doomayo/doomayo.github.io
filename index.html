        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');

        }

        // --- ASCII Rain Logic ---
        let rainInterval;
        const canvas = document.getElementById('ascii-rain');
        const ctx = canvas.getContext('2d');
        let drops = [];
        const fontSize = 14;
        const rainSpeed = 50; // Delay in ms between frames
        let lastTime = 0;

        function initRain() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const columns = Math.floor(canvas.width / fontSize);
            drops = Array(columns).fill(1).map(() => Math.random() * -100); // Start above screen
        }

        // --- Network Effect Logic (Light Mode) ---
        let networkInterval;
        const netCanvas = document.getElementById('network-effect');
        const netCtx = netCanvas.getContext('2d');
        let particles = [];
        const particleCount = 60; // Number of nodes
        const connectionDistance = 150;
        const netSpeed = 20; // 50fps max

        class Particle {
            constructor() {
                this.x = Math.random() * netCanvas.width;
                this.y = Math.random() * netCanvas.height;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce
                if (this.x < 0 || this.x > netCanvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > netCanvas.height) this.vy *= -1;
            }
            draw() {
                netCtx.fillStyle = 'rgba(15, 118, 110, 0.5)'; // Tealish
                netCtx.beginPath();
                netCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                netCtx.fill();
            }
        }

        function initNetwork() {
            netCanvas.width = window.innerWidth;
            netCanvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function drawNetwork() {
            netCtx.clearRect(0, 0, netCanvas.width, netCanvas.height);

            // Update & Draw Particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                // Draw Connections
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectionDistance) {
                        netCtx.beginPath();
                        netCtx.strokeStyle = `rgba(14, 165, 233, ${1 - distance / connectionDistance})`; // fading blue
                        netCtx.lineWidth = 1;
                        netCtx.moveTo(particles[i].x, particles[i].y);
                        netCtx.lineTo(particles[j].x, particles[j].y);
                        netCtx.stroke();
                    }
                }
            }

            if (!document.documentElement.classList.contains('dark')) {
                networkInterval = requestAnimationFrame(drawNetwork);
            }
        }

        function checkNetwork() {
            const isDark = document.documentElement.classList.contains('dark');
            const canvas = document.getElementById('network-effect');

            if (!isDark) { // Light Mode
                canvas.classList.remove('opacity-0');
                if (!networkInterval) {
                    initNetwork();
                    drawNetwork();
                }
            } else { // Dark Mode
                canvas.classList.add('opacity-0');
                if (networkInterval) {
                    cancelAnimationFrame(networkInterval);
                    networkInterval = null;
                }
            }
        }

        function drawRain(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;

            if (deltaTime < rainSpeed) {
                if (document.documentElement.classList.contains('dark')) {
                    rainInterval = requestAnimationFrame(drawRain);
                }
                return;
            }
            lastTime = timestamp;

            // Fade out
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                // Random char (Katakana + Latin)
                const text = String.fromCharCode(0x30A0 + Math.random() * 96);

                // RGB Rainbow Effect
                const r = Math.floor(Math.random() * 255);
                const g = Math.floor(Math.random() * 255);
                const b = Math.floor(Math.random() * 255);
                ctx.fillStyle = `rgb(${r},${g},${b})`;

                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }

            if (document.documentElement.classList.contains('dark')) {
                rainInterval = requestAnimationFrame(drawRain);
            }
        }

        function checkRain() {
            const isDark = document.documentElement.classList.contains('dark');
            const canvas = document.getElementById('ascii-rain');

            if (isDark) {
                canvas.classList.remove('opacity-0');
                if (!rainInterval) {
                    initRain(); // Resize/Reset
                    drawRain();
                }
            } else {
                canvas.classList.add('opacity-0');
                if (rainInterval) {
                    cancelAnimationFrame(rainInterval);
                    rainInterval = null;
                }
            }
        }

        window.addEventListener('resize', () => {
            const isDark = document.documentElement.classList.contains('dark');
            if (isDark) initRain();
            else initNetwork();
        });

                    document.getElementById('modalContactTitle').innerText = t.contactTitle;
                    document.getElementById('modalEmailLabel').innerText = t.email;
                    document.getElementById('modalAddressLabel').innerText = t.address;
                    document.getElementById('modalCloseBtn').innerText = t.close;
                }

            } else {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        function confirmEmail(e) {
            const msg = currentLang === 'de' ? 'Möchten Sie eine E-Mail an Waheed senden?' :
                'Do you want to send an email to Waheed?';

            if (!confirm(msg)) {
                e.preventDefault();
                return false;
            }
            return true;
        }

        function openProject(index) {
            const t = translations[currentLang];
            const proj = t.projects.list[index];
            const allMedia = staticData.projectImages.find(p => p.id === proj.id).images;
            const content = document.getElementById('projectModalContent');

            // Separate PDFs from other media
            const pdfs = allMedia.filter(item => item.endsWith('.pdf'));
            const otherMedia = allMedia.filter(item => !item.endsWith('.pdf'));

            // Generate HTML for PDFs
            const pdfHTML = pdfs.map(pdf => `
                <div class="w-full h-[500px] rounded-xl border border-slate-200 dark:border-white/10 shadow-lg mb-8 overflow-hidden relative">
                     <embed src="${pdf}" type="application/pdf" width="100%" height="100%">
                </div>
            `).join('');

            // Generate HTML for Gallery (Images & Videos)
            const galleryHTML = otherMedia.map((img, idx) => {
                // Skip thumbnail in gallery for project 1 if it matches the cover image
                if (proj.id === 1 && img === allMedia[0]) return '';

                if (img.endsWith('.mp4')) {
                    return `
                        <video controls autoplay loop muted playsinline class="w-full aspect-video object-cover rounded-xl border border-slate-200 dark:border-white/10 shadow-lg mb-4">
                            <source src="${img}" type="video/mp4">
                        </video>
                    `;
                }
                return `
                <img src="${img}" onclick="openLightbox('${img}')" class="w-full rounded-xl border border-slate-200 dark:border-white/10 shadow-lg mb-4 cursor-pointer hover:opacity-90 transition" alt="Project Screenshot">
                `;
            }).join('');

            content.innerHTML = `
                <div class="relative h-64 overflow-hidden rounded-t-2xl">
                    <div class="absolute inset-0 bg-gradient-to-t from-white dark:from-[#111] via-transparent to-transparent z-10"></div>
                    <img src="${allMedia[0]}" class="w-full h-full object-cover">
                    <div class="absolute bottom-6 left-8 z-20">
                        <div class="text-xs font-mono text-light-secondary dark:text-secondary bg-white/80 dark:bg-black/50 backdrop-blur px-2 py-1 rounded border border-light-secondary/30 dark:border-secondary/30 inline-block mb-2 font-bold">${proj.tech}</div>
                        <h2 class="text-3xl font-bold text-slate-900 dark:text-white">${proj.title}</h2>
                    </div>
                </div>
                
                <div class="p-8">
                    <h3 class="text-xl font-semibold text-slate-800 dark:text-slate-200 mb-4">${t.projects.modal.about}</h3>
                    <p class="text-slate-600 dark:text-slate-400 leading-relaxed mb-8 text-lg">${proj.longDesc}</p>
                    
                    ${pdfHTML}

                    <h3 class="text-xl font-semibold text-slate-800 dark:text-slate-200 mb-4">${t.projects.modal.gallery}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${galleryHTML}
                    </div>
                </div>
            `;

            toggleGlobalModal('projectModal');
        }

        // --- Lightbox Logic ---
        function openLightbox(src) {
            const modal = document.getElementById('lightboxModal');
            const img = document.getElementById('lightboxImage');

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            // Small delay for animation
            setTimeout(() => {
                img.src = src;
                img.classList.remove('scale-95', 'opacity-0');
                img.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeLightbox() {
            const modal = document.getElementById('lightboxModal');
            const img = document.getElementById('lightboxImage');

            img.classList.remove('scale-100', 'opacity-100');
            img.classList.add('scale-95', 'opacity-0');

            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
                img.src = ''; // Clear src
            }, 300);
        }

        // --- Init ---
        (function init() {
            // Theme
            const savedTheme = localStorage.getItem('theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemDark)) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');



            checkRain(); // Init Rain if dark
            checkNetwork(); // Init Network if light

            // Language
            const savedLang = localStorage.getItem('lang');
            if (savedLang) setLanguage(savedLang);
            else setLanguage('de'); // Default

            // Listeners
            ['contactModal', 'projectModal'].forEach(id => {
                document.getElementById(id).addEventListener('click', function (e) {
                    if (e.target === this) toggleGlobalModal(id);
                });
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#langDropdownContainer')) {
                    toggleDropdown(false);
                }
            });

        })();

        // ==========================================
        // RENDER
        // ==========================================

        function renderPortfolio() {
            const t = translations[currentLang];
            const app = document.getElementById('app');

            // Update Icon
            updateThemeIcon();

            // Header
            const headerHTML = `
                <header class="glass sticky top-0 z-40 transition-all">
                    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                        <div class="font-bold text-xl text-slate-800 dark:text-white tracking-tight flex items-baseline gap-2">
                             ${staticData.header.name} 
                             <span class="text-primary text-sm font-normal hidden sm:inline border-l-2 border-slate-300 dark:border-slate-700 pl-2">${t.header.title}</span>
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <!-- Theme Toggle -->
                            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-white/10 text-slate-600 dark:text-white hover:bg-slate-200 dark:hover:bg-white/20 transition flex items-center justify-center">
                                <i id="themeIcon" class="fa-solid fa-moon"></i>
                            </button>

                            <!-- Lang Dropdown -->
                            <div class="relative" id="langDropdownContainer">
                                <button onclick="toggleDropdown()" class="h-10 px-3 rounded-full bg-slate-100 dark:bg-white/10 text-slate-600 dark:text-white hover:bg-slate-200 dark:hover:bg-white/20 transition flex items-center gap-2 font-medium text-sm">
                                    <span>${t.header.flag}</span> <span class="hidden sm:inline">${t.header.code}</span> <i class="fa-solid fa-chevron-down text-xs opacity-70"></i>
                                </button>
                                <!-- Dropdown Menu -->
                                <div id="langMenu" class="hidden absolute top-12 right-0 w-32 bg-white dark:bg-[#151515] border border-slate-200 dark:border-white/10 rounded-xl shadow-xl overflow-hidden z-50">
                                    <button onclick="setLanguage('de')" class="w-full text-left px-4 py-3 text-sm hover:bg-slate-50 dark:hover:bg-white/5 flex items-center gap-3 ${currentLang === 'de' ? 'text-primary font-bold' : 'text-slate-600 dark:text-slate-300'}">
                                        <span>🇩🇪</span> Deutsch
                                    </button>
                                    <button onclick="setLanguage('en')" class="w-full text-left px-4 py-3 text-sm hover:bg-slate-50 dark:hover:bg-white/5 flex items-center gap-3 ${currentLang === 'en' ? 'text-primary font-bold' : 'text-slate-600 dark:text-slate-300'}">
                                        <span>🇺🇸</span> English
                                    </button>
                                </div>
                            </div>

                            <button onclick="toggleGlobalModal('contactModal')" class="bg-slate-800 hover:bg-slate-700 dark:bg-white/10 dark:hover:bg-white/20 text-white px-5 py-2 rounded-full transition text-sm font-medium border border-transparent dark:border-white/10 flex items-center gap-2 backdrop-blur-md">
                                <i class="fa-solid fa-envelope"></i> <span class="hidden sm:inline">${t.header.contact}</span>
                            </button>
                        </div>
                    </div>
                </header>
            `;

            const heroHTML = `
                <section class="min-h-[60vh] flex flex-col justify-center items-center text-center px-6 relative pt-20 pb-10">
                    <div class="relative mb-8 group animate-float">
                        <div class="hidden dark:block absolute -inset-1 bg-gradient-to-r from-primary to-secondary rounded-full blur opacity-25 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
                        <img src="${staticData.header.image}" class="relative w-48 h-48 rounded-full border-4 border-white dark:border-white/10 object-cover shadow-2xl bg-slate-200 dark:bg-black">
                    </div>
                    <div class="space-y-4 max-w-2xl">
                        <h1 class="text-5xl md:text-7xl font-bold text-slate-900 dark:text-white tracking-tight mb-2">
                            <span class="text-gradient">${staticData.header.name}</span>
                        </h1>
                        <p class="text-2xl text-slate-500 dark:text-slate-400 font-light">${t.header.title}</p>
                        <p class="text-primary font-medium tracking-wide border border-primary/20 bg-primary/5 py-1 px-4 rounded-full inline-block mt-2">${t.header.uni}</p>
                    </div>
                    
                    <div class="mt-12 flex gap-4">
                        <a href="#projects" class="px-8 py-3 rounded-full bg-slate-900 text-white dark:bg-white dark:text-black font-bold hover:bg-slate-700 dark:hover:bg-slate-200 transition shadow-lg dark:shadow-[0_0_20px_rgba(255,255,255,0.3)]">
                            ${t.hero.portfolioBtn}
                        </a>
                         <button onclick="toggleGlobalModal('contactModal')" class="px-8 py-3 rounded-full border border-slate-300 dark:border-white/20 text-slate-700 dark:text-white font-medium hover:bg-slate-100 dark:hover:bg-white/5 transition">
                            ${t.hero.contactBtn}
                        </button>
                    </div>
                </section>
            `;

            const aboutHTML = `
                <section class="max-w-3xl mx-auto px-6 py-10">
                    <div class="glass p-10 rounded-3xl relative overflow-hidden group shadow-lg dark:shadow-none">
                        <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-primary to-secondary"></div>

                    </div>
                </section>

            let skillsHTML = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">';
            staticData.skills.forEach(skill => {
                // Determine layout direction for margins

                skillsHTML += `
                    <div class="bg-white dark:bg-[#111] p-6 rounded-2xl border border-slate-100 dark:border-white/5 hover:border-primary/50 transition duration-300 group neon-glow bg-opacity-50 shadow-sm dark:shadow-none">

                        <div class="flex flex-wrap gap-2">

                        </div>

                `;
            });
            skillsHTML += '</div>';

            const skillsSection = `
                <section class="max-w-7xl mx-auto px-6 py-12">
                     <h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-10 border-l-4 border-primary pl-4">${t.skills.title}</h2>
                    ${skillsHTML}
                </section>
            `;

            let projListHTML = '<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">';
            t.projects.list.forEach((proj, index) => {
                const images = staticData.projectImages.find(p => p.id === proj.id).images;
                projListHTML += `
                    <div onclick="openProject(${index})" class="bg-white dark:bg-[#111] rounded-2xl border border-slate-200 dark:border-white/5 p-6 hover:border-primary/50 transition duration-300 cursor-pointer group hover:-translate-y-1 relative overflow-hidden shadow-sm hover:shadow-lg dark:shadow-none">
                        <div class="absolute top-0 right-0 p-4 opacity-0 group-hover:opacity-100 transition-opacity text-primary">
                            <i class="fa-solid fa-arrow-up-right-from-square"></i>
                        </div>
                        <div class="mb-4 h-48 rounded-xl bg-slate-100 dark:bg-[#000] overflow-hidden border border-slate-100 dark:border-white/5 relative">
                             <img src="${images[0]}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-105 transition duration-500">
                             <div class="absolute bottom-2 left-2">
                                <span class="bg-white/90 dark:bg-black/70 backdrop-blur text-primary text-[10px] uppercase font-bold px-2 py-1 rounded border border-primary/20">${proj.tech}</span>
                             </div>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2 group-hover:text-primary transition-colors">${proj.title}</h3>
                        <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed line-clamp-2">${proj.shortDesc}</p>
                    </div>
                `;
            });
            projListHTML += '</div>';

            let expListHTML = '<div class="space-y-4">';
            t.experience.jobs.forEach(job => {
                expListHTML += `
                    <div class="relative pl-8 border-l-2 border-slate-200 dark:border-white/10 hover:border-primary transition-colors py-2 group">
                        <div class="absolute -left-[9px] top-3 w-4 h-4 rounded-full bg-white dark:bg-[#050505] border-2 border-slate-300 dark:border-slate-600 group-hover:border-primary"></div>

                    <div class="relative z-10">&copy; 2025 Waheed Abdulbaki Shurbaji</div>

            app.innerHTML = headerHTML + heroHTML + aboutHTML + skillsSection + splitSection + footerHTML;
        }
    </script>
